apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hydrosat-monitoring-core
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: hydrosat-platform
  sources:
    - repoURL: https://prometheus-community.github.io/helm-charts
      chart: kube-prometheus-stack
      targetRevision: 82.16.0
      helm:
        releaseName: hydrosat-monitoring
        valueFiles:
          - $values/gitops/argocd/values/kube-prometheus-stack-values.yaml
    - repoURL: https://github.com/BranfordTGbieor/hydrosat-infra.git
      targetRevision: HEAD
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
