apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hydrosat-loki
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: hydrosat-platform
  sources:
    - repoURL: https://grafana.github.io/helm-charts
      chart: loki
      targetRevision: 6.53.0
      helm:
        releaseName: hydrosat-loki
        valueFiles:
          - $values/gitops/argocd/values/loki-values.yaml
    - repoURL: REPLACE_WITH_GIT_REPOSITORY_URL
      targetRevision: HEAD
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
