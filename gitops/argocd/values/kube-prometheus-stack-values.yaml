fullnameOverride: hydrosat-monitoring

defaultRules:
  create: true
  rules:
    alertmanager: true
    etcd: false
    kubeApiserverAvailability: true
    kubeApiserverBurnrate: true
    kubeApiserverHistogram: true
    kubeApiserverSlos: true
    kubeControllerManager: false
    kubeProxy: false
    kubeSchedulerAlerting: false
    kubeSchedulerRecording: false
    kubeStateMetrics: true
    kubelet: true
    kubernetesApps: true
    kubernetesResources: true
    kubernetesStorage: true
    kubernetesSystem: true
    network: true
    node: true
    prometheus: true
    prometheusOperator: true

grafana:
  defaultDashboardsTimezone: utc
  admin:
    existingSecret: hydrosat-grafana-admin
    userKey: admin-user
    passwordKey: admin-password
  service:
    type: ClusterIP
  additionalDataSources:
    - name: Loki
      type: loki
      access: proxy
      url: http://hydrosat-loki-gateway.monitoring.svc.cluster.local
      isDefault: false
      jsonData:
        maxLines: 5000

alertmanager:
  enabled: true
  alertmanagerSpec:
    useExistingSecret: true
    configSecret: hydrosat-alertmanager-config
    replicas: 1
    retention: 24h
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 250m
        memory: 256Mi
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: gp2
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 1Gi
prometheus:
  prometheusSpec:
    replicas: 1
    retention: 3d
    resources:
      requests:
        cpu: 300m
        memory: 1Gi
      limits:
        cpu: 1000m
        memory: 2Gi
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: gp2
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 8Gi
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false

prometheusOperator:
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

kube-state-metrics:
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

nodeExporter:
  enabled: true

additionalPrometheusRulesMap:
  hydrosat-dagster:
    groups:
      - name: hydrosat-dagster.rules
        rules:
          - alert: DagsterWebserverUnavailable
            expr: kube_deployment_status_replicas_unavailable{namespace="dagster",deployment="hydrosat-dagster-webserver"} > 0
            for: 10m
            labels:
              severity: warning
              service: dagster
            annotations:
              summary: Dagster webserver has unavailable replicas
              description: The Dagster webserver deployment has had unavailable replicas for more than 10 minutes.
          - alert: DagsterUserCodeUnavailable
            expr: kube_deployment_status_replicas_unavailable{namespace="dagster",deployment="hydrosat-dagster-user-code"} > 0
            for: 10m
            labels:
              severity: warning
              service: dagster
            annotations:
              summary: Dagster user-code deployment has unavailable replicas
              description: The Dagster user-code deployment has had unavailable replicas for more than 10 minutes.
          - alert: DagsterPodsRestartingFrequently
            expr: increase(kube_pod_container_status_restarts_total{namespace="dagster"}[15m]) > 3
            for: 10m
            labels:
              severity: warning
              service: dagster
            annotations:
              summary: Dagster pods are restarting frequently
              description: One or more Dagster containers restarted more than three times in 15 minutes.
