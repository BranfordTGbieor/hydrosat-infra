apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: hydrosat-alertmanager-config
  namespace: monitoring
spec:
  refreshInterval: 15m
  secretStoreRef:
    kind: ClusterSecretStore
    name: hydrosat-aws-secretsmanager
  target:
    name: hydrosat-alertmanager-config
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        alertmanager.yaml: |
          global:
            resolve_timeout: 5m
            slack_api_url: '{{ .slackWebhookUrl }}'
            smtp_smarthost: '{{ .smtpSmarthost }}'
            smtp_from: '{{ .smtpFrom }}'
            smtp_auth_username: '{{ .smtpAuthUsername }}'
            smtp_auth_password: '{{ .smtpAuthPassword }}'
            smtp_require_tls: true
          route:
            group_by: ["alertname", "namespace"]
            group_wait: 30s
            group_interval: 5m
            repeat_interval: 4h
            receiver: slack-notifications
            routes:
              - matchers:
                  - severity = critical
                receiver: email-notifications
                continue: true
          receivers:
            - name: slack-notifications
              slack_configs:
                - channel: '{{ .slackChannel }}'
                  send_resolved: true
                  title: '{{ "{{ .CommonAnnotations.summary | default .CommonLabels.alertname }}" }}'
                  text: '{{ "{{ .CommonAnnotations.description | default \"Alert fired.\" }}" }}'
            - name: email-notifications
              email_configs:
                - to: '{{ .emailTo }}'
                  send_resolved: true
  data:
    - secretKey: slackWebhookUrl
      remoteRef:
        key: REPLACE_WITH_ALERTMANAGER_NOTIFIER_SECRET_ARN
        property: slackWebhookUrl
    - secretKey: slackChannel
      remoteRef:
        key: REPLACE_WITH_ALERTMANAGER_NOTIFIER_SECRET_ARN
        property: slackChannel
    - secretKey: emailTo
      remoteRef:
        key: REPLACE_WITH_ALERTMANAGER_NOTIFIER_SECRET_ARN
        property: emailTo
    - secretKey: smtpSmarthost
      remoteRef:
        key: REPLACE_WITH_ALERTMANAGER_NOTIFIER_SECRET_ARN
        property: smtpSmarthost
    - secretKey: smtpFrom
      remoteRef:
        key: REPLACE_WITH_ALERTMANAGER_NOTIFIER_SECRET_ARN
        property: smtpFrom
    - secretKey: smtpAuthUsername
      remoteRef:
        key: REPLACE_WITH_ALERTMANAGER_NOTIFIER_SECRET_ARN
        property: smtpAuthUsername
    - secretKey: smtpAuthPassword
      remoteRef:
        key: REPLACE_WITH_ALERTMANAGER_NOTIFIER_SECRET_ARN
        property: smtpAuthPassword
