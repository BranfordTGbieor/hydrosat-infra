apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: hydrosat-alertmanager-config
  namespace: monitoring
spec:
  refreshInterval: 15m
  secretStoreRef:
    kind: ClusterSecretStore
    name: hydrosat-aws-secretsmanager
  target:
    name: hydrosat-alertmanager-config
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        alertmanager.yaml: |
          global:
            resolve_timeout: 5m
            slack_api_url: '{{ .slackWebhookUrl }}'
          route:
            group_by: ["alertname", "namespace"]
            group_wait: 30s
            group_interval: 5m
            repeat_interval: 4h
            receiver: slack-notifications
          receivers:
            - name: slack-notifications
              slack_configs:
                - channel: '{{ .slackChannel }}'
                  send_resolved: true
                  title: '{{ "{{ .CommonAnnotations.summary | default .CommonLabels.alertname }}" }}'
                  text: '{{ "{{ .CommonAnnotations.description | default \"Alert fired.\" }}" }}'
  data:
    - secretKey: slackWebhookUrl
      remoteRef:
        key: arn:aws:secretsmanager:us-east-1:564268553986:secret:hydrosat/dev/alertmanager-Xc9Tj9
        property: slackWebhookUrl
    - secretKey: slackChannel
      remoteRef:
        key: arn:aws:secretsmanager:us-east-1:564268553986:secret:hydrosat/dev/alertmanager-Xc9Tj9
        property: slackChannel
