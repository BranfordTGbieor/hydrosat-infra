apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: hydrosat-dagster-db
  namespace: dagster
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: hydrosat-aws-secretsmanager
  target:
    name: hydrosat-dagster-db
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        username: "{{ .username }}"
        password: "{{ .password }}"
        url: "postgresql://{{ .username }}:{{ .password }}@{{ .host }}:{{ .port }}/{{ .dbname }}"
  data:
    - secretKey: username
      remoteRef:
        key: arn:aws:secretsmanager:us-east-1:564268553986:secret:rds!db-7d20fe63-2183-4b03-8559-7319faafd0cb-HQTAhH
        property: username
    - secretKey: password
      remoteRef:
        key: arn:aws:secretsmanager:us-east-1:564268553986:secret:rds!db-7d20fe63-2183-4b03-8559-7319faafd0cb-HQTAhH
        property: password
    - secretKey: host
      remoteRef:
        key: arn:aws:secretsmanager:us-east-1:564268553986:secret:rds!db-7d20fe63-2183-4b03-8559-7319faafd0cb-HQTAhH
        property: host
    - secretKey: port
      remoteRef:
        key: arn:aws:secretsmanager:us-east-1:564268553986:secret:rds!db-7d20fe63-2183-4b03-8559-7319faafd0cb-HQTAhH
        property: port
    - secretKey: dbname
      remoteRef:
        key: arn:aws:secretsmanager:us-east-1:564268553986:secret:rds!db-7d20fe63-2183-4b03-8559-7319faafd0cb-HQTAhH
        property: dbname
